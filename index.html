<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Criador de Inimigos - DSAC</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#050508;
color:#d1d1d1;
font-family:Arial;
}

.bloco{
background:#111116;
border:1px solid #2a2a34;
padding:20px;
border-radius:12px;
margin:20px auto;
max-width:900px;
}

h2{
margin-top:0;
color:#ff4d4d;
border-bottom:1px solid #2a2a34;
padding-bottom:6px;
}

input,select,textarea{
background:#08080c;
border:1px solid #2a2a34;
color:#e5e5e5;
border-radius:8px;
padding:8px;
width:100%;
}

.linha{
margin:10px 0;
display:flex;
flex-direction:column;
}

.status-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.status-box{
background:#08080c;
padding:10px;
border-radius:8px;
border:1px solid #2a2a34;
}

button{
background:#8b0000;
border:none;
color:white;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#b30000;
}

.ataque{
border:1px solid #2a2a34;
padding:10px;
border-radius:8px;
margin:10px 0;
}

.tituloSec{
color:#ff6b6b;
margin-bottom:6px;
}

.pericia{
display:grid;
grid-template-columns:1fr 80px 40px 200px;
gap:10px;
align-items:center;
margin:5px 0;
}

.dice{
cursor:pointer;
font-size:20px;
text-align:center;
}

.resultado{
font-size:12px;
color:#9be7ff;
}

</style>
</head>

<body>

<div id="ficha">

<div class="bloco">
<h2>Slot de Inimigo</h2>

<select id="slot">
<option value="1">Slot 1</option>
<option value="2">Slot 2</option>
<option value="3">Slot 3</option>
<option value="4">Slot 4</option>
<option value="5">Slot 5</option>
<option value="6">Slot 6</option>
<option value="7">Slot 7</option>
<option value="8">Slot 8</option>
<option value="9">Slot 9</option>
<option value="10">Slot 10</option>
</select>

</div>

<div class="bloco">

<h2>Informações do Inimigo</h2>

<div class="linha">
<label>Nome</label>
<input id="nome">
</div>

<div class="linha">
<label>Tipo</label>
<select id="tipo">
<option>Monstro</option>
<option>Humano</option>
<option>Aberração</option>
<option>Boss</option>
</select>
</div>

<div class="linha">
<label>Nível</label>
<input type="number" id="nivel" value="1" onchange="recalcularStatus()">
</div>

<div class="linha">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

</div>

<div class="bloco">

<h2>Atributos</h2>

<div class="status-grid">

<div class="status-box">
<label>FOR</label>
<input type="number" id="atr_FOR" value="0">
</div>

<div class="status-box">
<label>CON</label>
<input type="number" id="atr_CON" value="0" onchange="recalcularStatus()">
</div>

<div class="status-box">
<label>AGI</label>
<input type="number" id="atr_AGI" value="0" onchange="recalcularStatus()">
</div>

<div class="status-box">
<label>INT</label>
<input type="number" id="atr_INT" value="0" onchange="recalcularStatus()">
</div>

<div class="status-box">
<label>POD</label>
<input type="number" id="atr_POD" value="0">
</div>

</div>

</div>

<div class="bloco">

<h2>Status</h2>

<div class="status-grid">

<div class="status-box">
<label>Vida</label>
<input id="vida" type="number">
</div>

<div class="status-box">
<label>Sanidade</label>
<input id="sanidade" type="number">
</div>

<div class="status-box">
<label>RD</label>
<input id="rd" type="number">
</div>

<div class="status-box">
<label>Esquiva</label>
<input id="esquiva" disabled>
</div>

</div>

</div>

<div class="bloco">

<h2>Ataques</h2>

<div id="ataques"></div>

<button onclick="addAtaque()">Adicionar Ataque</button>

</div>

<div class="bloco">

<button onclick="salvar()">Salvar Inimigo</button>
<button onclick="gerarPDF()">Exportar PDF</button>

</div>

</div>

<script>

let ataques=[]

function addAtaque(){

ataques.push({nome:"",ataque:"",dano:"",desc:""})

renderAtaques()

}

function renderAtaques(){

const box=document.getElementById("ataques")

box.innerHTML=""

ataques.forEach((a,i)=>{

box.innerHTML+=`

<div class="ataque">

<div class="tituloSec">Ataque ${i+1}</div>

<input placeholder="Nome"
oninput="ataques[${i}].nome=this.value">

<input placeholder="Rolagem de ataque (ex: 2d20+6)"
oninput="ataques[${i}].ataque=this.value">

<input placeholder="Dano (ex: 3d10+4)"
oninput="ataques[${i}].dano=this.value">

<span class="dice" onclick="rolarAtaque(${i})">🎲</span>

<span id="res_${i}" class="resultado"></span>

<textarea placeholder="Descrição"
oninput="ataques[${i}].desc=this.value"></textarea>

</div>

`

})

}

function rolarDados(expr){

const regex=/(\d+)d(\d+)([+-]\d+)?/
const match=expr.match(regex)

if(!match)return "erro"

const qtd=parseInt(match[1])
const faces=parseInt(match[2])
const mod=parseInt(match[3]||0)

let rolls=[]
let total=0

for(let i=0;i<qtd;i++){

const r=Math.floor(Math.random()*faces)+1

rolls.push(r)

total+=r

}

total+=mod

return {rolls,total}

}

function rolarAtaque(i){

const atk=ataques[i].ataque
const dmg=ataques[i].dano

const rAtk=rolarDados(atk)
const rDmg=rolarDados(dmg)

if(rAtk==="erro"||rDmg==="erro"){

document.getElementById("res_"+i).innerText="Formato inválido"

return

}

document.getElementById("res_"+i).innerText=

`Ataque: ${atk} → ${rAtk.total} | Dano: ${dmg} → ${rDmg.total}`

}

function recalcularStatus(){

const nivel=parseInt(document.getElementById("nivel").value)||1
const con=parseInt(document.getElementById("atr_CON").value)||0
const intt=parseInt(document.getElementById("atr_INT").value)||0
const agi=parseInt(document.getElementById("atr_AGI").value)||0

const vidaMax=(20+con*2)*nivel
const sanMax=(20+intt*2)*nivel

document.getElementById("vida").value=vidaMax
document.getElementById("sanidade").value=sanMax
document.getElementById("esquiva").value=10+agi

}

function salvar(){

const slot=document.getElementById("slot").value

const dados={

nome:nome.value,
tipo:tipo.value,
nivel:nivel.value,
descricao:descricao.value,
vida:vida.value,
sanidade:sanidade.value,
rd:rd.value,
esquiva:esquiva.value,
ataques:ataques,
atributos:{
FOR:atr_FOR.value,
CON:atr_CON.value,
AGI:atr_AGI.value,
INT:atr_INT.value,
POD:atr_POD.value
}

}

localStorage.setItem("inimigo_"+slot,JSON.stringify(dados))

alert("Inimigo salvo!")

}

function carregar(){

const slot=document.getElementById("slot").value

const d=JSON.parse(localStorage.getItem("inimigo_"+slot))

if(!d)return

nome.value=d.nome
tipo.value=d.tipo
nivel.value=d.nivel
descricao.value=d.descricao
vida.value=d.vida
sanidade.value=d.sanidade
rd.value=d.rd

atr_FOR.value=d.atributos?.FOR||0
atr_CON.value=d.atributos?.CON||0
atr_AGI.value=d.atributos?.AGI||0
atr_INT.value=d.atributos?.INT||0
atr_POD.value=d.atributos?.POD||0

ataques=d.ataques||[]

renderAtaques()

recalcularStatus()

}

document.getElementById("slot").addEventListener("change",carregar)

async function gerarPDF(){

const {jsPDF}=window.jspdf

const canvas=await html2canvas(document.getElementById("ficha"))

const img=canvas.toDataURL("image/png")

const pdf=new jsPDF()

pdf.addImage(img,"PNG",5,5,200,280)

pdf.save("inimigo.pdf")

}

recalcularStatus()
carregar()

</script>

</body>
</html>
