<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Criador de Inimigos - DSAC</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#050508;
color:#d1d1d1;
font-family:Arial;
}

.bloco{
background:#111116;
border:1px solid #2a2a34;
padding:20px;
border-radius:12px;
margin:20px auto;
max-width:900px;
}

h2{
margin-top:0;
color:#ff4d4d;
border-bottom:1px solid #2a2a34;
padding-bottom:6px;
}

input,select,textarea{
background:#08080c;
border:1px solid #2a2a34;
color:#e5e5e5;
border-radius:8px;
padding:8px;
width:100%;
}

.linha{
margin:10px 0;
display:flex;
flex-direction:column;
}

.status-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.status-box{
background:#08080c;
padding:10px;
border-radius:8px;
border:1px solid #2a2a34;
}

button{
background:#8b0000;
border:none;
color:white;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#b30000;
}

.ataque{
border:1px solid #2a2a34;
padding:10px;
border-radius:8px;
margin:10px 0;
}

.tituloSec{
color:#ff6b6b;
margin-bottom:6px;
}

.pericia{
display:grid;
grid-template-columns:1fr 80px 40px 200px;
gap:10px;
align-items:center;
margin:5px 0;
}

.dice{
cursor:pointer;
font-size:20px;
text-align:center;
transition: all 0.3s ease;
}

.dice:hover{
color:#00ffff;
text-shadow: 0 0 8px #00ffff, 0 0 12px #00ffff;
}

.resultado{
font-size:12px;
color:#9be7ff;
}

</style>
</head>

<body>

<div id="ficha">

<div class="bloco">
<h2>Slot de Inimigo</h2>

<select id="slot">
<option value="1">Slot 1</option>
<option value="2">Slot 2</option>
<option value="3">Slot 3</option>
<option value="4">Slot 4</option>
<option value="5">Slot 5</option>
<option value="6">Slot 6</option>
<option value="7">Slot 7</option>
<option value="8">Slot 8</option>
<option value="9">Slot 9</option>
<option value="10">Slot 10</option>
</select>

</div>


<div class="bloco">

<h2>Informações do Inimigo</h2>

<div class="linha">
<label>Nome</label>
<input id="nome">
</div>

<div class="linha">
<label>Tipo</label>
<select id="tipo">
<option>Monstro</option>
<option>Humano</option>
<option>Aberração</option>
<option>Boss</option>
</select>
</div>

<div class="linha">
<label>Nível</label>
<input type="number" id="nivel" value="1" onchange="recalcularStatus()">
</div>

<div class="linha">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

</div>


<div class="bloco">

<h2>Atributos</h2>

<div class="status-grid">
<div class="status-box">
<label>Iniciativa (auto)</label>
<input id="iniciativa" disabled>
</div>

<div class="status-box">
<label>Ataque (auto)</label>
<input id="ataqueAuto" disabled>
</div>

<div class="status-box">
<label>FOR</label>
<input type="number" id="atr_FOR" value="0">
</div>

<div class="status-box">
<label>CON</label>
<input type="number" id="atr_CON" value="0" onchange="recalcularStatus()">
</div>

<div class="status-box">
<label>AGI</label>
<input type="number" id="atr_AGI" value="0" onchange="recalcularStatus()">
</div>

<div class="status-box">
<label>INT</label>
<input type="number" id="atr_INT" value="0" onchange="recalcularStatus()">
</div>

<div class="status-box">
<label>POD</label>
<input type="number" id="atr_POD" value="0">
</div>

</div>

</div>


<div class="bloco">

<h2>Perícias</h2>

<div id="pericias"></div>

</div>


<div class="bloco">

<h2>Status</h2>

<div class="status-grid">

<div class="status-box">
<label>Vida</label>
<input id="vida" type="number">
</div>

<div class="status-box">
<label>Sanidade</label>
<input id="sanidade" type="number">
</div>

<div class="status-box">
<label>RD</label>
<input id="rd" type="number">
</div>

<div class="status-box">
<label>Esquiva (auto)</label>
<input id="esquiva" disabled>
</div>

<div class="status-box">
<label>Deslocamento (quadrados)</label>
<input id="deslocamento" disabled>
</div>

</div>

</div>


<div class="bloco">

<h2>Ataques</h2>

<div id="ataques"></div>

<button onclick="addAtaque()">Adicionar Ataque</button>

</div>


<div class="bloco">

<button onclick="salvar()">Salvar Inimigo</button>
<button onclick="gerarPDF()">Exportar PDF</button>

</div>

</div>


<script>

const periciasLista=[
"Luta","Fortitude","Reflexos","Furtividade",
"Iniciativa","Pontaria","Enganação","Percepção","Vontade"
]

let ataques=[]

function criarPericias(){

const box=document.getElementById("pericias")

periciasLista.forEach((p,i)=>{

box.innerHTML+=`

<div class="pericia">

<div>${p}</div>

<select id="per_${i}">
${[...Array(10).keys()].map(v=>`<option>${v+1}</option>`).join("")}
</select>

<span class="dice" onclick="rolarPericia(${i})">🎲</span>

<span id="res_${i}" class="resultado"></span>

</div>

`

})

}

function d20(){
return Math.floor(Math.random()*20)+1
}

function rolarPericia(i){

const qtd=parseInt(document.getElementById("per_"+i).value)

const resultados=[]
let maior=0

for(let x=0;x<qtd;x++){
const r=d20()
resultados.push(r)
if(r>maior)maior=r
}

const atributo=getAtributoPericia(i)

const bonus=parseInt(document.getElementById("atr_"+atributo).value)||0

const total=maior+bonus

document.getElementById("res_"+i).innerText=
`${qtd}d20 [${resultados.join(",")}] → ${maior}+${bonus}=${total}`

}

function getAtributoPericia(i){

const mapa={
0:"FOR",
1:"CON",
2:"AGI",
3:"AGI",
4:"AGI",
5:"AGI",
6:"INT",
7:"INT",
8:"POD"
}

return mapa[i]

}

// --- Status agora com deslocamento ---
function recalcularStatus(){

const con=parseInt(document.getElementById("atr_CON").value)||0
const intt=parseInt(document.getElementById("atr_INT").value)||0
const agi=parseInt(document.getElementById("atr_AGI").value)||0
const nivel=parseInt(document.getElementById("nivel").value)||1

// Esquiva
document.getElementById("esquiva").value=10+agi

// Deslocamento
document.getElementById("deslocamento").value=5+agi

// Iniciativa automática por nível
let iniciativa = nivel * 10
if(iniciativa > 30) iniciativa = 30

document.getElementById("iniciativa").value = iniciativa

// Ataque automático
let ataque=15+(nivel-1)*5
if(ataque>35) ataque=35

document.getElementById("ataqueAuto").value=ataque

}
// --- Ataques ---
function addAtaque(){
ataques.push({nome:"",ataque:"",dano:"",desc:""})
renderAtaques()
}

function renderAtaques(){

const box=document.getElementById("ataques")
box.innerHTML=""

ataques.forEach((a,i)=>{

box.innerHTML+=`
<div class="ataque">

<div class="tituloSec">Ataque ${i+1}</div>

<input placeholder="Nome" oninput="ataques[${i}].nome=this.value" value="${a.nome}">
<input placeholder="Rolagem (ex: 2d20+6)" oninput="ataques[${i}].ataque=this.value" value="${a.ataque}">
<input placeholder="Dano (ex: 3d10+4)" oninput="ataques[${i}].dano=this.value" value="${a.dano}">

<span class="dice" title="Rolar Dano" onclick="document.getElementById('res_ataque_${i}').innerText=rolarDano(ataques[${i}].dano)">🎲</span>
<span id="res_ataque_${i}" class="resultado"></span>

<textarea placeholder="Descrição" oninput="ataques[${i}].desc=this.value">${a.desc}</textarea>

<button onclick="excluirAtaque(${i})" style="background:#555;margin-top:5px;">❌ Excluir</button>

</div>
`

})

recalcularStatus()
}

function rolarDano(danoStr){
  const regex=/(\d+)d(\d+)([+-]\d+)?/i
  const match=danoStr.match(regex)
  if(!match) return danoStr

  const n=parseInt(match[1])
  const m=parseInt(match[2])
  const bonus=parseInt(match[3]||0)

  let resultados=[]
  let total=0
  for(let i=0;i<n;i++){
    const r=d20Custom(m)
    resultados.push(r)
    total+=r
  }

  total+=bonus

  return `${n}d${m}${bonus>=0?'+':''}${bonus} [${resultados.join(',')}] → ${total}`
}

function d20Custom(max){
  return Math.floor(Math.random()*max)+1
}

function excluirAtaque(i){
ataques.splice(i,1)
renderAtaques()
}

// --- Salvar e carregar ---
function salvar(){

const slot=document.getElementById("slot").value

const dados={

nome:nome.value,
tipo:tipo.value,
nivel:nivel.value,
descricao:descricao.value,
vida:vida.value,
sanidade:sanidade.value,
rd:rd.value,
esquiva:esquiva.value,
ataques:ataques,
atributos:{
FOR:atr_FOR.value,
CON:atr_CON.value,
AGI:atr_AGI.value,
INT:atr_INT.value,
POD:atr_POD.value
},
pericias:{}

}

periciasLista.forEach((p,i)=>{
dados.pericias["per_"+i]=document.getElementById("per_"+i).value
})

localStorage.setItem("inimigo_"+slot,JSON.stringify(dados))

alert("Inimigo salvo!")

}

function carregar(){

const slot=document.getElementById("slot").value

const d=JSON.parse(localStorage.getItem("inimigo_"+slot))

if(!d)return

nome.value=d.nome
tipo.value=d.tipo
nivel.value=d.nivel
descricao.value=d.descricao
vida.value=d.vida
sanidade.value=d.sanidade
rd.value=d.rd

atr_FOR.value=d.atributos?.FOR||0
atr_CON.value=d.atributos?.CON||0
atr_AGI.value=d.atributos?.AGI||0
atr_INT.value=d.atributos?.INT||0
atr_POD.value=d.atributos?.POD||0

periciasLista.forEach((p,i)=>{
document.getElementById("per_"+i).value=d.pericias?.["per_"+i]||1
})

ataques=d.ataques||[]

renderAtaques()
recalcularStatus()

}

document.getElementById("slot").addEventListener("change",carregar)

async function gerarPDF(){

const {jsPDF}=window.jspdf

const canvas=await html2canvas(document.getElementById("ficha"))

const img=canvas.toDataURL("image/png")

const pdf=new jsPDF()

pdf.addImage(img,"PNG",5,5,200,280)

pdf.save("inimigo.pdf")

}

criarPericias()
recalcularStatus()
carregar()

</script>

</body>
</html>
